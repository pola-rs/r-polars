name: Test R-universe

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/r-universe-test.yml
      - R/**
      - src/**
      - tests/**
      - tools/**
      - vignettes/*
      - configure*
      - DESCRIPTION
      - NAMESPACE
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/r-universe-test.yml
      - R/**
      - src/**
      - tests/**
      - tools/**
      - vignettes/*
      - configure*
      - DESCRIPTION
      - NAMESPACE
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LIB_SUMS_PATH: "tools/lib-sums.tsv"

jobs:
  build:
    - uses: actions/checkout@v6

    - name: Check for pre-built binary
      run: |
        if [[ -f "${LIB_SUMS_PATH}" ]]; then
          echo "TEST_BIN_LIB=true" >>"${GITHUB_ENV}"
          rm -f "$(rustup which cargo)"
        else
          echo "TEST_BIN_LIB=false" >>"${GITHUB_ENV}"
        fi

    - name: R-universe testing
      if: env.TEST_BIN_LIB == 'true'
      uses: r-universe-org/workflows/.github/workflows/build.yml@v3
      with:
        universe: ${{ github.repository_owner }}
